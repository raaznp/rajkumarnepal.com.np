{% extends 'dash/base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block header_title %}{{ title }}{% endblock %}

{% block content %}
<div style="max-width: 700px; margin: 0 auto; background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 40px;">
    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 24px;">
        <a href="{% url 'project_list' %}" style="width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.05); color: var(--text-muted); display: flex; align-items: center; justify-content: center; text-decoration: none; transition: var(--transition);" onmouseover="this.style.background='rgba(255,255,255,0.1)'; this.style.color='white'" onmouseout="this.style.background='rgba(255,255,255,0.05)'; this.style.color='var(--text-muted)'">
            <i class="fa-solid fa-arrow-left" style="font-size: 0.8rem;"></i>
        </a>
        <h2 style="margin: 0; font-weight: 600; font-size: 1.5rem;">{{ title }}</h2>
    </div>
    
    <form method="post" enctype="multipart/form-data" style="margin-top: 32px;">
        {% csrf_token %}
        
        <div style="margin-bottom: 24px;">
            <label style="display: block; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 8px;">Project Title</label>
            {{ form.title }}
        </div>

        <div style="margin-bottom: 24px;">
            <label style="display: block; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 8px;">Live Project URL</label>
            {{ form.url }}
        </div>

        <div style="margin-bottom: 32px;">
            <label style="display: block; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 8px;">Project Image</label>
            <div style="background: rgba(15, 23, 42, 0.4); padding: 20px; border-radius: 12px; border: 1px solid var(--border);">
                {{ form.image }}
            </div>
        </div>

        <div style="margin-bottom: 32px;">
            <label style="display: block; font-size: 0.9rem; color: var(--text-muted); margin-bottom: 8px;">Project Description</label>
            {{ form.description }}
        </div>

        <div style="display: flex; gap: 16px; margin-top: 40px;">
            <button type="submit" style="flex: 2; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: var(--transition); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);">
                <i class="fa-solid fa-floppy-disk" style="margin-right: 8px;"></i> Save Project
            </button>
            <a href="{% url 'project_list' %}" style="flex: 1; padding: 14px; background: rgba(255, 255, 255, 0.05); color: var(--text-main); text-align: center; text-decoration: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: var(--transition); border: 1px solid var(--border);">
                Cancel
            </a>
        </div>
    </form>
</div>

<style>
    input[type="text"], input[type="url"], select, textarea {
        width: 100%;
        padding: 14px 16px;
        background: rgba(15, 23, 42, 0.4);
        border: 1px solid var(--border);
        border-radius: 12px;
        color: white;
        font-size: 1rem;
        box-sizing: border-box;
        transition: all 0.3s ease;
    }
    input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
    }
</style>
{% endblock %}
